# workspace.yaml — ike-komet-ws
# ══════════════════════════════════
#
# ike-komet-ws
#
# Bootstrap:
#   git clone https://github.com/<org>/ike-komet-ws.git
#   cd ike-komet-ws
#   mvn ws:init
#   mvn clean install

schema-version: "1.0"
generated: 2026-04-24

defaults:
  branch: main
  maven-version: "4.0.0-rc-5"

subprojects:
  # Add subprojects with: mvn ws:add -Drepo=<git-url>

# Optional: IntelliJ project settings shared across collaborators.
# Uncomment and set to have `ws:scaffold-upgrade-*` enforce these values in
# .idea/misc.xml on every run. Useful when the project uses
# --enable-preview (set language-level to JDK_NN_PREVIEW).
# ide:
#   language-level: JDK_25_PREVIEW
#   jdk-name: "25"

  komet-bom:
    description: >
      komet-bom subproject.
    repo: https://github.com/ikmdev/komet-bom.git
    version: "3.0.7-SNAPSHOT"
    groupId: dev.ikm.komet
    depends-on: []

  tinkar-core:
    description: >
      tinkar-core subproject.
    repo: https://github.com/ikmdev/tinkar-core.git
    version: "1.127.2-SNAPSHOT"
    groupId: dev.ikm.tinkar
    depends-on: []
